<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Facebook Profile - Jeric Austria</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #fff;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Sticky Top Nav ───────────────────────────── */
  .top-nav {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    z-index: 200;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    transition: background 0.25s ease, box-shadow 0.25s ease;
  }
  .top-nav.scrolled {
    background: #fff;
    box-shadow: 0 1px 0 rgba(0,0,0,0.08);
  }

  /* Arrow icon — always white at top, dark when scrolled */
  .nav-arrow svg { color: #fff; width: 22px; height: 22px; transition: color 0.25s; }
  .top-nav.scrolled .nav-arrow svg { color: #1c1e21; }

  /* Right icons same treatment */
  .nav-right { display: flex; gap: 16px; align-items: center; }
  .nav-right svg { color: #fff; width: 22px; height: 22px; transition: color 0.25s; }
  .top-nav.scrolled .nav-right svg { color: #1c1e21; }

  /* Name that fades in beside arrow on scroll */
  .nav-name {
    font-size: 17px;
    font-weight: 700;
    color: #1c1e21;
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
    margin-left: 10px;
  }
  .top-nav.scrolled .nav-name { opacity: 1; }

  .nav-left { display: flex; align-items: center; }

  /* ── Banner ───────────────────────────────────── */
  .banner-wrap {
    position: relative;
    height: 210px;
    overflow: hidden;
    background: #1877f2;
    /* push content below fixed nav */
    margin-top: 0;
  }
  .banner-wrap canvas { width: 100%; height: 100%; display: block; }

  /* ── Profile card ─────────────────────────────── */
  .profile-card {
    background: #fff;
    padding-bottom: 12px;
    position: relative;
  }

  /* Avatar sitting half-over banner */
  .avatar-name-row {
    display: flex;
    align-items: flex-end;
    padding: 0 16px;
    /* pull row up so avatar crosses banner boundary */
    margin-top: -46px;
    gap: 10px;
    position: relative;
    z-index: 10;
  }

  .avatar-main {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    /* thick white ring */
    border: 4px solid #fff;
    overflow: hidden;
    flex-shrink: 0;
    background: #c0c0c0;
    /* shadow so it pops off banner */
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .avatar-main canvas { width: 92px; height: 92px; display: block; }

  .name-meta {
    padding-bottom: 6px;
    flex: 1;
    min-width: 0;
  }
  .profile-name {
    font-size: 20px;
    font-weight: 700;
    color: #1c1e21;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .profile-meta {
    font-size: 13px;
    margin-top: 2px;
  }
  .profile-meta .count { font-weight: 700; color: #1c1e21; }
  .profile-meta .label { font-weight: 400; color: #65676b; }

  /* ── Buttons ──────────────────────────────────── */
  .action-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px 0;
  }
  .btn-primary {
    flex: 1; background: #1877f2; color: #fff; border: none;
    border-radius: 8px; padding: 9px 12px; font-size: 15px;
    font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-secondary {
    flex: 1; background: #e4e6eb; color: #1c1e21; border: none;
    border-radius: 8px; padding: 9px 12px; font-size: 15px;
    font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }

  /* ── Tabs ─────────────────────────────────────── */
  .tabs { display: flex; padding: 10px 16px 0; gap: 8px; }
  .tab {
    padding: 6px 14px; border-radius: 20px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none;
    background: #e7f3ff; color: #1877f2;
  }
  .tab.inactive { background: transparent; color: #65676b; }

  /* ── Sections (no dividers) ───────────────────── */
  .section { background: #fff; padding: 16px; }
  .section-title { font-size: 17px; font-weight: 700; color: #1c1e21; margin-bottom: 12px; }

  /* ── Personal details ─────────────────────────── */
  .detail-row { display: flex; align-items: center; gap: 10px; font-size: 15px; color: #1c1e21; }
  .detail-icon {
    width: 36px; height: 36px; border-radius: 50%; background: #e4e6eb;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* ── Friends ──────────────────────────────────── */
  .friends-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .see-all { color: #1877f2; font-size: 15px; font-weight: 600; cursor: pointer; }
  .friends-row { display: flex; gap: 22px; }
  .friend-card {
    display: flex; flex-direction: column; align-items: center; gap: 5px; width: 60px;
  }
  .friend-avatar { width: 60px; height: 60px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
  .friend-avatar canvas { width: 60px; height: 60px; display: block; }
  .friend-name {
    font-size: 11px; font-weight: 600; color: #1c1e21;
    text-align: center; line-height: 1.3; word-break: break-word;
  }

  /* ── Posts ────────────────────────────────────── */
  .posts-label { background: #fff; padding: 16px 16px 8px; }
  .posts-label .section-title { margin-bottom: 0; }

  .post-card { background: #fff; }
  .post-header {
    display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px 0;
  }
  .post-avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
  .post-avatar canvas { width: 40px; height: 40px; display: block; }
  .post-meta { flex: 1; }
  .post-author { font-size: 14px; font-weight: 700; color: #1c1e21; }
  .post-action { font-size: 13px; color: #65676b; }
  .post-date {
    font-size: 12px; color: #65676b;
    display: flex; align-items: center; gap: 4px; margin-top: 2px;
  }
  .post-dots { color: #65676b; font-size: 22px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .post-image-wrap { width: 100%; margin-top: 10px; overflow: hidden; }
  .post-image-wrap canvas { width: 100%; display: block; }
</style>
</head>
<body>

<!-- Fixed Top Nav -->
<div class="top-nav" id="topNav">
  <div class="nav-left">
    <div class="nav-arrow">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </div>
    <span class="nav-name">Jeric Austria</span>
  </div>
  <div class="nav-right">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
  </div>
</div>

<!-- Banner (starts at very top, behind fixed nav) -->
<div class="banner-wrap">
  <canvas id="bannerCanvas"></canvas>
</div>

<!-- Profile Card -->
<div class="profile-card">
  <div class="avatar-name-row">
    <div class="avatar-main">
      <canvas id="avatarMain" width="92" height="92"></canvas>
    </div>
    <div class="name-meta">
      <div class="profile-name">Jeric Austria</div>
      <div class="profile-meta">
        <span class="count">2</span><span class="label"> friends</span>
        &nbsp;·&nbsp;
        <span class="count">1</span><span class="label"> post</span>
      </div>
    </div>
  </div>

  <div class="action-row">
    <button class="btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      Add friend
    </button>
    <button class="btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      Message
    </button>
  </div>

  <div class="tabs">
    <button class="tab">All</button>
    <button class="tab inactive">Photos</button>
    <button class="tab inactive">Reels</button>
  </div>
</div>

<!-- Personal Details -->
<div class="section">
  <div class="section-title">Personal details</div>
  <div class="detail-row">
    <div class="detail-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#65676b"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    Male
  </div>
</div>

<!-- Friends -->
<div class="section">
  <div class="friends-header">
    <div class="section-title" style="margin-bottom:0">Friends</div>
    <span class="see-all">See all</span>
  </div>
  <div class="friends-row">
    <div class="friend-card">
      <div class="friend-avatar"><canvas id="friend1" width="60" height="60"></canvas></div>
      <div class="friend-name">Bjorn Astrid</div>
    </div>
    <div class="friend-card">
      <div class="friend-avatar"><canvas id="friend2" width="60" height="60"></canvas></div>
      <div class="friend-name">Kurt Valerio</div>
    </div>
  </div>
</div>

<!-- All Posts label -->
<div class="posts-label">
  <div class="section-title">All posts</div>
</div>

<!-- Post 1 -->
<div class="post-card">
  <div class="post-header">
    <div class="post-avatar"><canvas id="postAvatar1" width="40" height="40"></canvas></div>
    <div class="post-meta">
      <div>
        <span class="post-author">Jeric Austria</span>
        <span class="post-action"> updated his profile picture.</span>
      </div>
      <div class="post-date">
        Dec 27, 2016 ·
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#65676b"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
    </div>
    <div class="post-dots">···</div>
  </div>
  <div class="post-image-wrap">
    <canvas id="postImage1"></canvas>
  </div>
</div>

<script>
// ── Scroll-triggered nav ─────────────────────────────────────────
const topNav = document.getElementById('topNav');
// Trigger once banner is mostly scrolled past (~180px)
window.addEventListener('scroll', () => {
  if (window.scrollY > 160) {
    topNav.classList.add('scrolled');
  } else {
    topNav.classList.remove('scrolled');
  }
}, { passive: true });

// ── Avatar painter ───────────────────────────────────────────────
function hsl(h, s, l) { return `hsl(${h},${s}%,${l}%)`; }

function drawAbstractAvatar(canvas, seed) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const hue  = (seed * 73 + 30) % 360;
  const hue2 = (hue + 140) % 360;
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, hsl(hue, 65, 52));
  grad.addColorStop(1, hsl(hue2, 58, 38));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  ctx.beginPath();
  ctx.arc(w * 0.5, h * 0.34, w * 0.19, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w * 0.5, h * 0.76, w * 0.30, h * 0.24, 0, 0, Math.PI * 2);
  ctx.fill();
}

drawAbstractAvatar(document.getElementById('avatarMain'),  5);
drawAbstractAvatar(document.getElementById('friend1'),    17);
drawAbstractAvatar(document.getElementById('friend2'),    34);
drawAbstractAvatar(document.getElementById('postAvatar1'), 5);

// ── Banner ───────────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('bannerCanvas');
  const wrap   = canvas.parentElement;
  canvas.width  = wrap.offsetWidth || 480;
  canvas.height = 210;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  const sky = ctx.createLinearGradient(0, 0, 0, h);
  sky.addColorStop(0, '#0f2557');
  sky.addColorStop(0.6, '#1a4a8a');
  sky.addColorStop(1, '#2e6fc4');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  [[0.10,0.12],[0.25,0.08],[0.40,0.18],[0.55,0.06],[0.70,0.15],
   [0.85,0.09],[0.92,0.20],[0.05,0.25],[0.30,0.30],[0.60,0.25],
   [0.78,0.28],[0.15,0.35]].forEach(([sx, sy]) => {
    ctx.beginPath(); ctx.arc(sx*w, sy*h, 1.5, 0, Math.PI*2); ctx.fill();
  });

  ctx.fillStyle = '#f5e87a';
  ctx.beginPath(); ctx.arc(w*0.82, h*0.22, 18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a4a8a';
  ctx.beginPath(); ctx.arc(w*0.82+8, h*0.22-5, 14, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#0b1f3a';
  ctx.beginPath(); ctx.moveTo(0, h);
  ctx.bezierCurveTo(w*0.15,h*0.65,w*0.30,h*0.75,w*0.45,h*0.70);
  ctx.bezierCurveTo(w*0.60,h*0.65,w*0.75,h*0.80,w,h*0.72);
  ctx.lineTo(w,h); ctx.closePath(); ctx.fill();

  ctx.fillStyle = '#091628';
  ctx.beginPath(); ctx.moveTo(0, h);
  ctx.bezierCurveTo(w*0.20,h*0.78,w*0.50,h*0.85,w*0.70,h*0.80);
  ctx.bezierCurveTo(w*0.85,h*0.76,w*0.95,h*0.88,w,h*0.82);
  ctx.lineTo(w,h); ctx.closePath(); ctx.fill();

  const water = ctx.createLinearGradient(0, h*0.82, 0, h);
  water.addColorStop(0,'rgba(30,80,160,0.5)');
  water.addColorStop(1,'rgba(10,30,80,0.8)');
  ctx.fillStyle = water; ctx.fillRect(0,h*0.82,w,h*0.18);

  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const y = h*0.85 + i*5;
    ctx.beginPath(); ctx.moveTo(w*0.3,y); ctx.lineTo(w*0.7,y); ctx.stroke();
  }
})();

// ── Post image ───────────────────────────────────────────────────
(function () {
  const canvas = document.getElementById('postImage1');
  const wrap   = canvas.parentElement;
  canvas.width  = wrap.offsetWidth || 480;
  canvas.height = Math.round(canvas.width * 0.56);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a1a2e'); bg.addColorStop(1, '#16213e');
  ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

  const glow = ctx.createRadialGradient(w*0.5,h*0.4,0,w*0.5,h*0.4,w*0.4);
  glow.addColorStop(0,'rgba(30,80,180,0.35)'); glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = glow; ctx.fillRect(0,0,w,h);

  ctx.fillStyle = 'rgba(20,20,35,0.95)';
  ctx.beginPath(); ctx.ellipse(w*0.5,h*0.75,w*0.22,h*0.35,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(w*0.5,h*0.32,w*0.13,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle = 'rgba(100,150,255,0.4)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(w*0.5,h*0.32,w*0.13,Math.PI*1.1,Math.PI*1.9); ctx.stroke();

  ctx.fillStyle = 'rgba(20,20,35,0.9)';
  ctx.fillRect(w*0.5-4, h*0.08, 8, h*0.16);
  ctx.beginPath(); ctx.arc(w*0.5,h*0.08,5,0,Math.PI*2); ctx.fill();
})();
</script>
</body>
</html>
